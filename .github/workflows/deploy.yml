name: Deploy EKS Deployment
# Deploy K8s resources to EKS cluster 

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:  
  group: ${{ github.workflow }}-${{ github.ref }}  
  cancel-in-progress: true


jobs:
  test-k8s-connections:
    runs-on: ubuntu-latest
    environment: dev

    steps:
    # 1. Downloading the code from the repository to the virtual machine GitHub
    - name: Checkout Source Code
      uses: actions/checkout@v6

    - name: configure aws credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: kubectl init
      run: |
          echo "Show app version"
          aws --version
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ vars.AWS_EKS_NAME}}
          kubectl version
          kubectl get nodes
